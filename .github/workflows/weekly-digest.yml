name: Weekday Paper Digest

on:
  schedule:
    # 평일(월-금) 매일 오전 9시 KST = 00:00 UTC
    - cron: "0 0 * * 1-5"
  workflow_dispatch:  # 수동 실행 허용

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # data/seen.json 커밋 위해 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py

      - name: Commit updated seen.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update seen papers [skip ci]"
            git push
          else
            echo "No changes to seen.json"
          fi
